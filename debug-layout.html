<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=375, initial-scale=1">
<title>卡片布局 Debug v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FDF8F4; font-family: -apple-system, sans-serif; padding: 16px; }
  .rs-card { display: flex; background: rgba(255,255,255,0.88); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(196,129,122,0.06); margin-bottom: 12px; }
  .rs-img { width: 100px; min-height: 100px; flex-shrink: 0; align-self: stretch; background: linear-gradient(135deg,#E8B4AE,#C4817A); display:flex; align-items:center; justify-content:center; font-size:24px; color:#fff; }
  .rs-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; min-width: 0; }
  .rs-top { display: flex; flex-direction: row; min-width: 0; }
  .rs-name { font-size: 14px; font-weight: 600; color: #2C2422; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .rs-dist { font-size: 11px; color: #C4817A; font-weight: 600; flex-shrink: 0; margin-left: auto; padding-left: 4px; }
  .rs-desc { font-size: 11px; color: #8A7A76; line-height: 1.5; margin: 3px 0 2px; word-break: break-all; overflow-wrap: break-word; }
  .label { font-size: 12px; color: #666; margin: 16px 0 6px; font-weight: 600; }
  .hint { font-size: 11px; color: #999; margin: 2px 0 8px; }
</style>
</head>
<body>

<div class="label">▶ 新版：简介 word-break:break-all 自动换行，名称 flex:1 收缩让距离可见</div>

<!-- 长名称+长距离 -->
<div class="rs-card">
  <div class="rs-img">🌸</div>
  <div class="rs-body">
    <div class="rs-top">
      <div class="rs-name">青秀山风景区中泰南宁孔敬友谊园</div>
      <span class="rs-dist">1685km</span>
    </div>
    <div class="rs-desc">青秀山风景区内的一处中泰友谊主题园林，融合了泰国建筑风格与中国园林艺术</div>
    <div style="font-size:11px;color:#e8a838;">⭐ 4.6</div>
  </div>
</div>

<!-- 短名称+长描述 -->
<div class="rs-card">
  <div class="rs-img">🌸</div>
  <div class="rs-body">
    <div class="rs-top">
      <div class="rs-name">南宁人民公园九曲桥</div>
      <span class="rs-dist">3km</span>
    </div>
    <div class="rs-desc">南宁人民公园九曲桥位于民生街道民生街道人民东路1号南宁市人民公园(西南角)，风景名胜;风景名胜;风景名胜</div>
    <div style="font-size:11px;color:#e8a838;">⭐ 4.2</div>
  </div>
</div>

<!-- 正常 -->
<div class="rs-card">
  <div class="rs-img">🌸</div>
  <div class="rs-body">
    <div class="rs-top">
      <div class="rs-name">青秀山</div>
      <span class="rs-dist">2km</span>
    </div>
    <div class="rs-desc">南宁市区内的5A级风景区，城市绿肺</div>
    <div style="font-size:11px;color:#e8a838;">⭐ 4.8</div>
  </div>
</div>

</body>
</html>
