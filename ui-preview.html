<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>花期 - 评论重新设计 V2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FAF6F2;
  --surface: #FFFFFF;
  --primary: #C4817A;
  --primary-dark: #A55A52;
  --text: #2C2422;
  --text2: #8A7A76;
  --border: rgba(196,129,122,0.1);
}
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 40px 16px;
  display: flex;
  justify-content: center;
}
.page { max-width: 420px; width: 100%; }

/* ===== COMMENT INPUT CARD V2 ===== */
.ci2 {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(44,36,34,0.05);
}

.ci2-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.ci2-tt {
  font-size: 16px;
  font-weight: 700;
}
.ci2-sub {
  font-size: 13px;
  color: var(--text2);
}

/* stars row */
.ci2-stars {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-bottom: 14px;
}
.ci2-stars text {
  font-size: 30px;
  color: #ddd;
  cursor: pointer;
  padding: 4px;
}
.ci2-stars .act { color: #F5A623; }
.ci2-stars .sl {
  font-size: 13px;
  color: var(--text2);
  margin-left: 8px;
  font-weight: 500;
}

/* textarea input full width */
.ci2-inp {
  width: 100%;
  min-height: 110px;
  padding: 14px 16px;
  background: #FAF6F2;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  resize: none;
  line-height: 1.6;
  color: var(--text);
  transition: border-color .2s;
}
.ci2-inp:focus {
  border-color: var(--primary);
  background: #fff;
}
.ci2-inp::placeholder {
  color: #B5A5A0;
}

/* bottom row: left empty space, right button */
.ci2-btm {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-top: 10px;
  gap: 10px;
}
.ci2-bt {
  padding: 10px 28px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s;
}
.ci2-bt:disabled {
  opacity: 0.35;
  cursor: default;
}
.ci2-bt:not(:disabled):hover {
  opacity: 0.9;
}

/* ===== COMMENT LIST ===== */
.cl {
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(44,36,34,0.05);
  margin-top: 16px;
}
.cl-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cl-hd-l { font-size: 16px; font-weight: 700; }
.cl-hd-r { font-size: 12px; color: var(--text2); }

.cmt {
  display: flex;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.cmt:last-child { border: none; }
.cmt-av {
  width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 700;
}
.cmt-bd { flex: 1; min-width: 0; }
.cmt-row1 {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 2px;
}
.cmt-n { font-size: 13px; font-weight: 600; }
.cmt-t { font-size: 11px; color: var(--text2); }
.cmt-s { font-size: 12px; color: #F5A623; margin-left: auto; letter-spacing: 1px; }
.cmt-tx { font-size: 14px; color: #5C4A46; line-height: 1.6; }
</style>
</head>
<body>
<div class="page">

<!-- V2 Comment Input Card -->
<div class="ci2">
  <div class="ci2-hd">
    <text class="ci2-tt">✏️ 写评价</text>
    <text class="ci2-sub">给这里打分</text>
  </div>
  <div class="ci2-stars">
    <text class="act">★</text><text class="act">★</text><text class="act">★</text><text class="act">★</text><text>★</text>
    <span class="sl">4分 · 很好</span>
  </div>
  <textarea class="ci2-inp" placeholder="分享你的旅行体验…">樱花季来的，人虽然多但真的很美。老斋舍的屋顶视野超好，早去能避开人群。</textarea>
  <div class="ci2-btm">
    <button class="ci2-bt">发布</button>
  </div>
</div>

<!-- Comment List -->
<div class="cl">
  <div class="cl-hd">
    <text class="cl-hd-l">评价 <span style="font-weight:400;color:var(--text2);font-size:14px;">3 条</span></text>
    <text class="cl-hd-r">好评率 100%</text>
  </div>
  <div class="cmt">
    <div class="cmt-av" style="background:linear-gradient(135deg,#C4817A,#9A5E58);">小</div>
    <div class="cmt-bd">
      <div class="cmt-row1">
        <span class="cmt-n">小樱</span><span class="cmt-t">3天前</span><span class="cmt-s">★★★★★</span>
      </div>
      <div class="cmt-tx">上周刚去，樱花正好满开！老斋舍屋顶拍照绝了，建议早8点前到人少。</div>
    </div>
  </div>
  <div class="cmt">
    <div class="cmt-av" style="background:linear-gradient(135deg,#5B7B5A,#3D5A3C);">张</div>
    <div class="cmt-bd">
      <div class="cmt-row1">
        <span class="cmt-n">张老师</span><span class="cmt-t">1周前</span><span class="cmt-s">★★★★☆</span>
      </div>
      <div class="cmt-tx">预约很难抢，但值得。建议带充电宝，凌波门日落很浪漫。</div>
    </div>
  </div>
</div>

<div style="height:40px;"></div>
</div>
</body>
</html>
